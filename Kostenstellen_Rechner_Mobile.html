<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F4E78">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Kostenstellen-Rechner</title>
<style>
  :root {
    color-scheme: light;
    --dark-blue: #1F4E78;
    --mid-blue: #2E75B6;
    --light-bg: #F4F7FA;
    --card-bg: #FFFFFF;
    --border: #D8E1EA;
    --text: #1A1A1A;
    --danger: #C0392B;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--light-bg);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    font-size: 17px;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }
  button, input { touch-action: manipulation; }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 110px 16px;
  }
  .page { display: none; }
  .page.active { display: block; }

  h1 {
    color: var(--dark-blue);
    font-size: 26px;
    margin: 6px 0 4px 0;
    text-align: center;
    font-weight: 800;
  }
  .subtitle {
    text-align: center;
    font-size: 15px;
    color: #4A4A4A;
    margin: 0 0 18px 0;
    padding: 0 4px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 14px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .row {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .row:last-child { border-bottom: none; }

  .field { display: flex; flex-direction: column; margin-bottom: 10px; }
  .field:last-of-type { margin-bottom: 0; }
  .field label {
    font-size: 13px;
    font-weight: 700;
    color: var(--dark-blue);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .field input {
    font-size: 17px;
    padding: 12px 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    width: 100%;
    font-family: inherit;
    background: #FBFCFD;
    -webkit-appearance: none;
  }
  .field input:focus {
    outline: none;
    border-color: var(--mid-blue);
    background: #fff;
  }

  .remove-btn {
    position: absolute;
    top: 10px;
    right: 0;
    background: none;
    border: none;
    color: var(--danger);
    font-size: 22px;
    font-weight: bold;
    width: 40px;
    height: 40px;
    cursor: pointer;
  }

  .btn {
    font-size: 18px;
    padding: 16px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    width: 100%;
    display: block;
  }
  .btn-primary { background: var(--dark-blue); color: white; }
  .btn-primary:active { background: var(--mid-blue); }
  .btn-secondary { background: white; color: var(--dark-blue); border: 1.5px solid var(--dark-blue); }
  .btn-secondary:active { background: #E9F0F7; }
  .btn-add {
    background: white;
    color: var(--dark-blue);
    border: 1.5px dashed var(--dark-blue);
    font-size: 16px;
    padding: 14px;
    margin-top: 4px;
  }
  .btn-add:active { background: #E9F0F7; }

  .action-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(6px);
    border-top: 1px solid var(--border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom)) 16px;
    display: flex;
    justify-content: center;
    z-index: 20;
  }
  .action-bar .inner { width: 100%; max-width: 480px; }

  .error-box {
    background: #FBEAE8;
    border: 1.5px solid var(--danger);
    color: var(--danger);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 14px;
    display: none;
  }

  /* Ergebnis-Seite */
  .stand {
    text-align: center;
    font-size: 14px;
    color: #555;
    margin: 0 0 16px 0;
  }

  .bar-row { margin-bottom: 18px; }
  .bar-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    gap: 8px;
  }
  .bar-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .bar-amount { font-size: 16px; font-weight: 800; color: var(--dark-blue); white-space: nowrap; }
  .bar-track {
    background: #E7EEF4;
    border-radius: 8px;
    height: 20px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mid-blue), var(--dark-blue));
    border-radius: 8px;
    min-width: 4px;
    transition: width 0.4s ease;
  }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 480px;
  }
  th, td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: var(--dark-blue);
    color: white;
    font-size: 12px;
    text-transform: uppercase;
  }
  tr:nth-child(even) td { background: #F4F7FA; }
  td.num, th.num { text-align: right; }

  .total-box {
    margin-top: 4px;
    padding: 18px;
    background: var(--dark-blue);
    color: white;
    border-radius: 14px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
  }
  .total-box span { display: block; font-size: 26px; margin-top: 4px; }

  .section-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--dark-blue);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin: 0 0 10px 2px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- SEITE 1: EINGABE -->
  <div class="page active" id="page-input">
    <h1>Kostenstellen-Rechner</h1>
    <p class="subtitle">Trage für jede Versicherung / Kostenstelle den monatlichen Beitrag und das Startdatum ein.</p>

    <div class="error-box" id="error-box"></div>

    <div class="card" id="rows-container"></div>

    <button class="btn btn-add" id="add-row-btn" type="button">+ Weitere Kostenstelle hinzufügen</button>
  </div>

  <!-- SEITE 2: ERGEBNIS -->
  <div class="page" id="page-result">
    <h1>Ergebnis</h1>
    <p class="stand" id="stand-text"></p>

    <div class="card">
      <div class="section-title">Gesamtkosten je Kostenstelle</div>
      <div id="bars-container"></div>
    </div>

    <div class="card">
      <div class="section-title">Details</div>
      <div class="table-wrap">
        <table id="result-table">
          <thead>
            <tr>
              <th>Kostenstelle</th>
              <th class="num">Beitrag</th>
              <th>Start</th>
              <th class="num">Monate</th>
              <th class="num">Gesamt</th>
            </tr>
          </thead>
          <tbody id="result-tbody"></tbody>
        </table>
      </div>
      <div class="total-box">
        Gesamtkosten aller Kostenstellen
        <span id="total-value"></span>
      </div>
    </div>
  </div>

</div>

<div class="action-bar" id="action-bar-input">
  <div class="inner">
    <button class="btn btn-primary" id="calc-btn" type="button">Berechnung anzeigen &rarr;</button>
  </div>
</div>

<div class="action-bar" id="action-bar-result" style="display:none;">
  <div class="inner">
    <button class="btn btn-secondary" id="back-btn" type="button">&larr; Zurück zur Eingabe</button>
  </div>
</div>

<script>
  var DEFAULT_START = "2017-02-01";
  var DEFAULT_ROWS = [
    { name: "Krankenversicherung", beitrag: 250, start: DEFAULT_START },
    { name: "Lebensversicherung", beitrag: 80, start: DEFAULT_START },
    { name: "KFZ-Versicherung", beitrag: 45, start: DEFAULT_START },
    { name: "Hausratversicherung", beitrag: 15, start: DEFAULT_START },
    { name: "Rechtsschutzversicherung", beitrag: 20, start: DEFAULT_START }
  ];

  var rowsContainer = document.getElementById("rows-container");
  var errorBox = document.getElementById("error-box");
  var rowIdCounter = 0;

  function addRow(data) {
    data = data || { name: "", beitrag: "", start: DEFAULT_START };
    rowIdCounter++;
    var id = "row-" + rowIdCounter;

    var row = document.createElement("div");
    row.className = "row";
    row.dataset.rowId = id;
    row.innerHTML =
      '<button type="button" class="remove-btn" title="Zeile entfernen">&times;</button>' +
      '<div class="field">' +
        '<label>Kostenstelle</label>' +
        '<input type="text" class="f-name" placeholder="z.B. Krankenversicherung" value="' + escapeHtml(data.name) + '">' +
      '</div>' +
      '<div class="field">' +
        '<label>Monatlicher Beitrag (€)</label>' +
        '<input type="number" class="f-beitrag" min="0" step="0.01" inputmode="decimal" placeholder="z.B. 50" value="' + data.beitrag + '">' +
      '</div>' +
      '<div class="field">' +
        '<label>Startdatum</label>' +
        '<input type="date" class="f-start" value="' + data.start + '">' +
      '</div>';

    rowsContainer.appendChild(row);

    row.querySelector(".remove-btn").addEventListener("click", function () {
      if (rowsContainer.querySelectorAll(".row").length > 1) {
        row.remove();
      }
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  DEFAULT_ROWS.forEach(addRow);

  document.getElementById("add-row-btn").addEventListener("click", function () {
    addRow();
  });

  function diffMonths(startStr) {
    var parts = startStr.split("-").map(Number);
    var sy = parts[0], sm = parts[1], sd = parts[2];
    var now = new Date();
    var ey = now.getFullYear(), em = now.getMonth() + 1, ed = now.getDate();
    var months = (ey - sy) * 12 + (em - sm);
    if (ed < sd) months -= 1;
    return Math.max(months, 0);
  }

  function formatEUR(value) {
    return value.toLocaleString("de-DE", { style: "currency", currency: "EUR" });
  }

  function formatDateDE(startStr) {
    var parts = startStr.split("-");
    return parts[2] + "." + parts[1] + "." + parts[0];
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }
  function clearError() {
    errorBox.style.display = "none";
    errorBox.textContent = "";
  }

  document.getElementById("calc-btn").addEventListener("click", function () {
    clearError();
    var rows = rowsContainer.querySelectorAll(".row");
    var data = [];

    for (var i = 0; i < rows.length; i++) {
      var name = rows[i].querySelector(".f-name").value.trim();
      var beitragStr = rows[i].querySelector(".f-beitrag").value;
      var start = rows[i].querySelector(".f-start").value;

      if (!name || !beitragStr || !start) { continue; }

      var beitrag = parseFloat(beitragStr);
      if (isNaN(beitrag) || beitrag < 0) {
        showError("Bitte bei \"" + (name || "einer Kostenstelle") + "\" einen gültigen Beitrag eintragen.");
        return;
      }
      data.push({ name: name, beitrag: beitrag, start: start });
    }

    if (data.length === 0) {
      showError("Bitte mindestens eine Kostenstelle vollständig ausfüllen (Name, Beitrag, Startdatum).");
      return;
    }

    renderResults(data);
    document.getElementById("page-input").classList.remove("active");
    document.getElementById("page-result").classList.add("active");
    document.getElementById("action-bar-input").style.display = "none";
    document.getElementById("action-bar-result").style.display = "flex";
    window.scrollTo(0, 0);
  });

  document.getElementById("back-btn").addEventListener("click", function () {
    document.getElementById("page-result").classList.remove("active");
    document.getElementById("page-input").classList.add("active");
    document.getElementById("action-bar-result").style.display = "none";
    document.getElementById("action-bar-input").style.display = "flex";
    window.scrollTo(0, 0);
  });

  function renderResults(data) {
    var today = new Date();
    document.getElementById("stand-text").textContent = "Stand: " + today.toLocaleDateString("de-DE");

    var results = data.map(function (d) {
      var months = diffMonths(d.start);
      var total = d.beitrag * months;
      return { name: d.name, beitrag: d.beitrag, start: d.start, months: months, total: total };
    });

    // Tabelle
    var tbody = document.getElementById("result-tbody");
    tbody.innerHTML = "";
    var sum = 0;
    results.forEach(function (r) {
      sum += r.total;
      var tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + escapeHtml(r.name) + "</td>" +
        '<td class="num">' + formatEUR(r.beitrag) + "</td>" +
        "<td>" + formatDateDE(r.start) + "</td>" +
        '<td class="num">' + r.months + "</td>" +
        '<td class="num">' + formatEUR(r.total) + "</td>";
      tbody.appendChild(tr);
    });
    document.getElementById("total-value").textContent = formatEUR(sum);

    // Balken (CSS, horizontal, mobil-freundlich)
    var barsContainer = document.getElementById("bars-container");
    barsContainer.innerHTML = "";
    var maxVal = Math.max.apply(null, results.map(function (r) { return r.total; }));
    if (maxVal <= 0) maxVal = 1;

    results.forEach(function (r) {
      var pct = Math.max((r.total / maxVal) * 100, 2);
      var barRow = document.createElement("div");
      barRow.className = "bar-row";
      barRow.innerHTML =
        '<div class="bar-top">' +
          '<span class="bar-name">' + escapeHtml(r.name) + '</span>' +
          '<span class="bar-amount">' + formatEUR(r.total) + '</span>' +
        '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
      barsContainer.appendChild(barRow);
    });
  }
</script>
</body>
</html>
