<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kostenstellen-Rechner</title>
<style>
  :root {
    --dark-blue: #1F4E78;
    --mid-blue: #2E75B6;
    --light-bg: #F4F7FA;
    --card-bg: #FFFFFF;
    --border: #C9D6E3;
    --text: #1A1A1A;
    --danger: #B00020;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--light-bg);
    font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    color: var(--text);
    font-size: 20px;
    line-height: 1.5;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 24px 60px 24px;
  }
  .page { display: none; }
  .page.active { display: block; }

  h1 {
    color: var(--dark-blue);
    font-size: 40px;
    margin: 10px 0 6px 0;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    font-size: 22px;
    color: #444;
    margin: 0 0 30px 0;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-end;
    padding: 18px 0;
    border-bottom: 2px solid var(--border);
  }
  .row:last-child { border-bottom: none; }

  .field { display: flex; flex-direction: column; flex: 1 1 200px; }
  .field label {
    font-size: 17px;
    font-weight: 600;
    color: var(--dark-blue);
    margin-bottom: 6px;
  }
  .field input {
    font-size: 22px;
    padding: 12px 10px;
    border: 2px solid var(--border);
    border-radius: 8px;
    width: 100%;
    font-family: inherit;
  }
  .field input:focus {
    outline: none;
    border-color: var(--mid-blue);
  }

  .remove-btn {
    flex: 0 0 auto;
    background: none;
    border: 2px solid var(--danger);
    color: var(--danger);
    font-size: 22px;
    font-weight: bold;
    border-radius: 8px;
    width: 52px;
    height: 52px;
    cursor: pointer;
  }
  .remove-btn:hover { background: var(--danger); color: white; }

  .btn {
    font-size: 24px;
    padding: 18px 34px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    display: inline-block;
    text-align: center;
  }
  .btn-primary { background: var(--dark-blue); color: white; }
  .btn-primary:hover { background: var(--mid-blue); }
  .btn-secondary { background: white; color: var(--dark-blue); border: 2px solid var(--dark-blue); }
  .btn-secondary:hover { background: #E9F0F7; }
  .btn-add {
    background: white;
    color: var(--dark-blue);
    border: 2px dashed var(--dark-blue);
    font-size: 20px;
    padding: 14px 20px;
    width: 100%;
    margin-top: 10px;
  }
  .btn-add:hover { background: #E9F0F7; }

  .actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .error-box {
    background: #FDECEC;
    border: 2px solid var(--danger);
    color: var(--danger);
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 19px;
    margin-bottom: 20px;
    display: none;
  }

  /* Ergebnis-Seite */
  .stand {
    text-align: center;
    font-size: 19px;
    color: #555;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark-blue);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin: 0 0 18px 2px;
  }

  .bar-row { margin-bottom: 24px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .bar-name { font-size: 21px; font-weight: 700; color: var(--text); }
  .bar-amount { font-size: 22px; font-weight: 800; color: var(--dark-blue); white-space: nowrap; }
  .bar-track {
    background: #E7EEF4;
    border-radius: 10px;
    height: 32px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--mid-blue), var(--dark-blue));
    border-radius: 10px;
    min-width: 6px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 19px;
  }
  th, td {
    padding: 14px 12px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }
  th {
    background: var(--dark-blue);
    color: white;
    font-size: 18px;
  }
  tr:nth-child(even) td { background: #F4F7FA; }
  td.num, th.num { text-align: right; }

  .total-box {
    margin-top: 24px;
    padding: 22px;
    background: var(--dark-blue);
    color: white;
    border-radius: 12px;
    text-align: center;
    font-size: 26px;
    font-weight: 700;
  }
  .total-box span { display: block; font-size: 34px; margin-top: 6px; }

  @media (max-width: 600px) {
    body { font-size: 18px; }
    h1 { font-size: 30px; }
    .field { flex: 1 1 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- SEITE 1: EINGABE -->
  <div class="page active" id="page-input">
    <h1>Kostenstellen-Rechner</h1>
    <p class="subtitle">Trage unten deine Versicherungen bzw. Kostenstellen ein.<br>Für jede: Name, monatlicher Beitrag und Startdatum.</p>

    <div class="error-box" id="error-box"></div>

    <div class="card" id="rows-container"></div>

    <button class="btn btn-add" id="add-row-btn" type="button">+ Weitere Kostenstelle hinzufügen</button>

    <div class="actions">
      <button class="btn btn-primary" id="calc-btn" type="button">Berechnung anzeigen &rarr;</button>
    </div>
  </div>

  <!-- SEITE 2: ERGEBNIS -->
  <div class="page" id="page-result">
    <h1>Ergebnis</h1>
    <p class="stand" id="stand-text"></p>

    <div class="card">
      <div class="section-title">Gesamtkosten je Kostenstelle</div>
      <div id="bars-container"></div>
    </div>

    <div class="card">
      <table id="result-table">
        <thead>
          <tr>
            <th>Kostenstelle</th>
            <th class="num">Monatlicher Beitrag</th>
            <th>Startdatum</th>
            <th class="num">Monate</th>
            <th class="num">Gesamtkosten</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
      <div class="total-box">
        Gesamtkosten aller Kostenstellen
        <span id="total-value"></span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" id="back-btn" type="button">&larr; Zurück zur Eingabe</button>
    </div>
  </div>

</div>

<script>
  var DEFAULT_START = "2017-02-01";
  var DEFAULT_ROWS = [
    { name: "", beitrag: "", start: DEFAULT_START },
    { name: "", beitrag: "", start: DEFAULT_START },
    { name: "KFZ-Versicherung", beitrag: 45, start: DEFAULT_START },
    { name: "Hausratversicherung", beitrag: 15, start: DEFAULT_START },
    { name: "Rechtsschutzversicherung", beitrag: 20, start: DEFAULT_START },
    { name: "GEZ", beitrag: 18.36, start: DEFAULT_START }
  ];

  var rowsContainer = document.getElementById("rows-container");
  var errorBox = document.getElementById("error-box");
  var rowIdCounter = 0;

  function addRow(data) {
    data = data || { name: "", beitrag: "", start: DEFAULT_START };
    rowIdCounter++;
    var id = "row-" + rowIdCounter;

    var row = document.createElement("div");
    row.className = "row";
    row.dataset.rowId = id;
    row.innerHTML =
      '<div class="field">' +
        '<label>Kostenstelle (Name)</label>' +
        '<input type="text" class="f-name" placeholder="z.B. Krankenversicherung" value="' + escapeHtml(data.name) + '">' +
      '</div>' +
      '<div class="field">' +
        '<label>Monatlicher Beitrag (€)</label>' +
        '<input type="number" class="f-beitrag" min="0" step="0.01" placeholder="z.B. 50" value="' + data.beitrag + '">' +
      '</div>' +
      '<div class="field">' +
        '<label>Startdatum</label>' +
        '<input type="date" class="f-start" value="' + data.start + '">' +
      '</div>' +
      '<button type="button" class="remove-btn" title="Zeile entfernen">&times;</button>';

    rowsContainer.appendChild(row);

    row.querySelector(".remove-btn").addEventListener("click", function () {
      if (rowsContainer.querySelectorAll(".row").length > 1) {
        row.remove();
      }
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  DEFAULT_ROWS.forEach(addRow);

  document.getElementById("add-row-btn").addEventListener("click", function () {
    addRow();
  });

  function diffMonths(startStr) {
    var parts = startStr.split("-").map(Number);
    var sy = parts[0], sm = parts[1], sd = parts[2];
    var now = new Date();
    var ey = now.getFullYear(), em = now.getMonth() + 1, ed = now.getDate();
    var months = (ey - sy) * 12 + (em - sm);
    if (ed < sd) months -= 1;
    return Math.max(months, 0);
  }

  function formatEUR(value) {
    return value.toLocaleString("de-DE", { style: "currency", currency: "EUR" });
  }

  function formatDateDE(startStr) {
    var parts = startStr.split("-");
    return parts[2] + "." + parts[1] + "." + parts[0];
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }
  function clearError() {
    errorBox.style.display = "none";
    errorBox.textContent = "";
  }

  document.getElementById("calc-btn").addEventListener("click", function () {
    clearError();
    var rows = rowsContainer.querySelectorAll(".row");
    var data = [];

    for (var i = 0; i < rows.length; i++) {
      var name = rows[i].querySelector(".f-name").value.trim();
      var beitragStr = rows[i].querySelector(".f-beitrag").value;
      var start = rows[i].querySelector(".f-start").value;

      if (!name || !beitragStr || !start) { continue; }

      var beitrag = parseFloat(beitragStr);
      if (isNaN(beitrag) || beitrag < 0) {
        showError("Bitte bei \"" + (name || "einer Kostenstelle") + "\" einen gültigen Beitrag eintragen.");
        return;
      }
      data.push({ name: name, beitrag: beitrag, start: start });
    }

    if (data.length === 0) {
      showError("Bitte mindestens eine Kostenstelle vollständig ausfüllen (Name, Beitrag, Startdatum).");
      return;
    }

    renderResults(data);
    document.getElementById("page-input").classList.remove("active");
    document.getElementById("page-result").classList.add("active");
    window.scrollTo(0, 0);
  });

  document.getElementById("back-btn").addEventListener("click", function () {
    document.getElementById("page-result").classList.remove("active");
    document.getElementById("page-input").classList.add("active");
    window.scrollTo(0, 0);
  });

  function renderResults(data) {
    var today = new Date();
    var todayStr = today.toLocaleDateString("de-DE");
    document.getElementById("stand-text").textContent = "Stand: " + todayStr;

    var results = data.map(function (d) {
      var months = diffMonths(d.start);
      var total = d.beitrag * months;
      return {
        name: d.name,
        beitrag: d.beitrag,
        start: d.start,
        months: months,
        total: total
      };
    });

    // Tabelle
    var tbody = document.getElementById("result-tbody");
    tbody.innerHTML = "";
    var sum = 0;
    results.forEach(function (r) {
      sum += r.total;
      var tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + escapeHtml(r.name) + "</td>" +
        '<td class="num">' + formatEUR(r.beitrag) + "</td>" +
        "<td>" + formatDateDE(r.start) + "</td>" +
        '<td class="num">' + r.months + "</td>" +
        '<td class="num">' + formatEUR(r.total) + "</td>";
      tbody.appendChild(tr);
    });
    document.getElementById("total-value").textContent = formatEUR(sum);

    // Balken (reine CSS-Balken statt SVG - vermeidet Überlappungen bei langen Namen)
    renderBars(results);
  }

  function renderBars(results) {
    var barsContainer = document.getElementById("bars-container");
    barsContainer.innerHTML = "";
    var maxVal = Math.max.apply(null, results.map(function (r) { return r.total; }));
    if (maxVal <= 0) maxVal = 1;

    results.forEach(function (r) {
      var pct = Math.max((r.total / maxVal) * 100, 1.5);
      var barRow = document.createElement("div");
      barRow.className = "bar-row";
      barRow.innerHTML =
        '<div class="bar-top">' +
          '<span class="bar-name">' + escapeHtml(r.name) + '</span>' +
          '<span class="bar-amount">' + formatEUR(r.total) + '</span>' +
        '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>';
      barsContainer.appendChild(barRow);
    });
  }
</script>
</body>
</html>
